<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Espárragos</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="login-body">

    <div class="login-box">

        <h1>🌱 Iniciar Sesión</h1>

        <p class="login-subtitulo">
            Sistema de Control de Espárragos
        </p>

        <input 
            type="text"
            id="usuario"
            placeholder="Ingrese usuario"
        >

        <!-- Contraseña con botón para mostrar -->
        <div style="position: relative; width: 100%;">
            <input 
                type="password"
                id="clave"
                placeholder="Ingrese contraseña"
                style="width: 100%; padding-right: 45px;"
            >

            <button
                type="button"
                onclick="mostrarClave()"
                style="
                    position: absolute;
                    right: 5px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: none;
                    border: none;
                    cursor: pointer;
                    font-size: 18px;
                "
            >
                👁️
            </button>
        </div>

        <button onclick="iniciarSesion()">
            Ingresar
        </button>

        <p id="mensajeError"></p>

    </div>

    <script>
        function iniciarSesion(){

            let usuario =
                document.getElementById("usuario").value;

            let clave =
                document.getElementById("clave").value;

            // Cambia aquí tu usuario y contraseña
            if(usuario === "Guiomar12" && clave === "G24T12D01j09."){

                localStorage.setItem(
                    "sesionActiva",
                    "true"
                );

                localStorage.setItem(
                    "horaLogin",
                    Date.now()
                );

                window.location.href = "index.html";

            }else{

                document.getElementById("mensajeError")
                .textContent =
                "Usuario o contraseña incorrectos";
            }
        }

        function mostrarClave(){

            let input =
                document.getElementById("clave");

            if(input.type === "password"){
                input.type = "text";
            }else{
                input.type = "password";
            }
        }
    </script>

</body>
</html>
